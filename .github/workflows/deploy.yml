name: Deploy Inventario VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-inventario-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar llave SSH
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy en VPS
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" << 'EOF'
            set -e

            echo "===> Entrando al proyecto"
            cd /var/www/inventario-app

            echo "===> Actualizando código"
            git fetch origin
            git reset --hard origin/main

            echo "===> Backend"
            cd /var/www/inventario-app/backend
            npm ci
            pm2 restart inventario-backend --update-env

            echo "===> Frontend"
            cd /var/www/inventario-app/frontend
            npm ci
            npm run build

            echo "===> Nginx"
            sudo nginx -t
            sudo systemctl reload nginx

            echo "===> Deploy completado"
          EOF
